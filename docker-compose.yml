services:
  file-drop:
    build: .
    container_name: file-drop
    ports:
      - "8000:8000"
    environment:
      - SSL_CERT_HOST=localhost
      # Optional: comma-separated DNS names or IPs for SAN, e.g. SSL_EXTRA_SANS=192.168.1.10,filedrop.local
      - SSL_EXTRA_SANS=
    volumes:
      - ./received_photos:/app/uploads
      - ./certs:/app/certs
    restart: unless-stopped
