<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Drop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f13;
      --surface:  #1a1a24;
      --border:   #2a2a3a;
      --text:     #e4e4ef;
      --muted:    #6e6e85;
      --accent:   #6c63ff;
      --accent-g: linear-gradient(135deg, #6c63ff 0%, #a855f7 100%);
      --green:    #34d399;
      --red:      #f87171;
      --radius:   16px;
      --font:     'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,.45);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
      background: var(--accent-g);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    /* ── Drop Zone ────────────────────────────────────────── */
    .drop-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 44px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(108,99,255,.06);
    }
    .drop-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .drop-icon {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }
    .drop-label {
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .drop-hint {
      color: var(--muted);
      font-size: 0.78rem;
    }

    /* ── Progress ─────────────────────────────────────────── */
    .progress-wrap {
      margin-top: 24px;
      display: none;
    }
    .progress-wrap.active { display: block; }

    .file-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .file-thumb {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .file-meta {
      flex: 1;
      overflow: hidden;
    }
    .file-name {
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-g);
      border-radius: 99px;
      transition: width .15s ease;
    }
    .pct {
      text-align: right;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 500;
      display: none;
      animation: fadeIn .25s ease;
    }
    .toast.success {
      display: block;
      background: rgba(52,211,153,.1);
      color: var(--green);
      border: 1px solid rgba(52,211,153,.25);
    }
    .toast.error {
      display: block;
      background: rgba(248,113,113,.1);
      color: var(--red);
      border: 1px solid rgba(248,113,113,.25);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Multi upload list ────────────────────────────────── */
    .upload-queue {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📸 File Drop</div>
    <p class="subtitle">Tap below to send photos to your computer</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="filePicker" accept="image/*" multiple />
      <div class="drop-icon">☁️</div>
      <div class="drop-label">Tap to choose photos</div>
      <div class="drop-hint">or drag &amp; drop them here</div>
    </div>

    <div id="uploadQueue" class="upload-queue"></div>
    <div id="toast" class="toast"></div>
  </div>

  <script>
    const dropZone   = document.getElementById('dropZone');
    const filePicker = document.getElementById('filePicker');
    const queue      = document.getElementById('uploadQueue');
    const toast      = document.getElementById('toast');

    /* ── Drag & drop visual cues ─────────────────────────── */
    ['dragenter','dragover'].forEach(e =>
      dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); }));
    ['dragleave','drop'].forEach(e =>
      dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); }));
    dropZone.addEventListener('drop', ev => {
      if (ev.dataTransfer.files.length) handleFiles(ev.dataTransfer.files);
    });

    filePicker.addEventListener('change', () => {
      if (filePicker.files.length) handleFiles(filePicker.files);
    });

    /* ── Handle selected files ───────────────────────────── */
    function handleFiles(files) {
      hideToast();
      const items = [...files];
      let done = 0, failed = 0;
      items.forEach(file => {
        const el = createProgressRow(file);
        queue.appendChild(el);
        uploadFile(file, el).then(ok => {
          ok ? done++ : failed++;
          if (done + failed === items.length) finish(done, failed);
        });
      });
      filePicker.value = '';
    }

    /* ── Build a progress row ────────────────────────────── */
    function createProgressRow(file) {
      const wrap = document.createElement('div');
      wrap.className = 'progress-wrap active';

      const thumb = URL.createObjectURL(file);
      wrap.innerHTML = `
        <div class="file-info">
          <img class="file-thumb" src="${thumb}" alt="" />
          <div class="file-meta">
            <div class="file-name">${file.name}</div>
            <div class="file-size">${formatBytes(file.size)}</div>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill"></div></div>
        <div class="pct">0 %</div>`;
      return wrap;
    }

    /* ── Upload a single file via XHR (real progress) ────── */
    function uploadFile(file, el) {
      return new Promise(resolve => {
        const xhr = new XMLHttpRequest();
        const fill = el.querySelector('.bar-fill');
        const pct  = el.querySelector('.pct');

        xhr.upload.addEventListener('progress', e => {
          if (!e.lengthComputable) return;
          const p = Math.round((e.loaded / e.total) * 100);
          fill.style.width = p + '%';
          pct.textContent  = p + ' %';
        });

        xhr.addEventListener('load', () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            fill.style.width = '100%';
            fill.style.background = 'var(--green)';
            pct.textContent = '✓';
            resolve(true);
          } else {
            fill.style.background = 'var(--red)';
            pct.textContent = 'Error';
            resolve(false);
          }
        });

        xhr.addEventListener('error', () => {
          fill.style.background = 'var(--red)';
          pct.textContent = 'Error';
          resolve(false);
        });

        const fd = new FormData();
        fd.append('file', file);
        xhr.open('POST', '/upload');
        xhr.send(fd);
      });
    }

    /* ── Finish batch ────────────────────────────────────── */
    function finish(done, failed) {
      if (failed === 0) {
        showToast('success', `✅ ${done} photo${done > 1 ? 's' : ''} uploaded successfully!`);
      } else {
        showToast('error', `⚠️ ${done} uploaded, ${failed} failed.`);
      }
      // Clear the progress rows after a short pause
      setTimeout(() => { queue.innerHTML = ''; }, 4000);
    }

    /* ── Toast helpers ───────────────────────────────────── */
    function showToast(type, msg) {
      toast.className = 'toast ' + type;
      toast.textContent = msg;
      setTimeout(hideToast, 5000);
    }
    function hideToast() {
      toast.className = 'toast';
      toast.textContent = '';
    }

    /* ── Utility ─────────────────────────────────────────── */
    function formatBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }
  </script>
</body>
</html>
